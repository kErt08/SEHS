<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2d7aad" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Dashboard — Sta. Elena SPTMS</title>
  <link rel="icon" href="assets/sehs-logo.png" type="image/png" />
  <link rel="apple-touch-icon" href="assets/sehs-logo.png" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body data-page="dashboard" class="dash-body">
  <div class="overlay" id="sidebar-overlay"></div>

  <div class="dash-shell">
    <aside class="dash-sidebar" aria-label="Main navigation">
      <div class="dash-sidebar__brand">
        <img src="assets/sehs-logo.png" alt="Sta. Elena High School" class="sehs-logo sehs-logo--lg" width="56" height="56" />
        <div>
          <strong>SEHS Portal</strong>
          <span>Sta. Elena High School</span>
        </div>
      </div>

      <nav class="dash-sidebar__nav" id="sidebar-nav"></nav>

      <div class="dash-sidebar__promo">
        <p class="dash-sidebar__promo-title">Need help?</p>
        <p class="dash-sidebar__promo-text">View the student handbook and school policies.</p>
        <button type="button" class="dash-promo-btn" data-goto="documents">Open Documents</button>
      </div>
    </aside>

    <div class="dash-workspace">
      <header class="dash-topbar">
        <button type="button" class="dash-menu-btn" id="menu-toggle" aria-label="Open menu">☰</button>

        <div class="dash-search">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input type="search" id="dash-search" placeholder="Search modules, announcements…" autocomplete="off" />
        </div>

        <div class="dash-topbar__actions">
          <span class="dash-live"><span class="dash-live__dot"></span> School Year 2025–26</span>
          <button type="button" class="dash-icon-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
            <svg class="icon-moon" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8A9.02 9.02 0 0 0 12 3z"/></svg>
          </button>
          <button type="button" class="dash-icon-btn" id="btn-notif" title="Notifications" aria-label="Notifications">
            <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.9V4.26C13.47 4.66 15 6.73 15 9v6z"/></svg>
            <span class="dash-icon-btn__badge">3</span>
          </button>
          <div class="dash-avatar" id="user-avatar" title="Profile">—</div>
        </div>
      </header>

      <div class="dash-layout">
        <main class="dash-main">
          <div class="dash-page-head hidden" id="dash-page-head">
            <h1 id="page-title">Dashboard</h1>
            <p id="page-subtitle">Welcome back.</p>
          </div>
          <div class="dash-content" id="content-area"></div>
        </main>

        <aside class="dash-panel" id="dash-panel" aria-label="Sidebar widgets"></aside>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
